# Application basics
spring.application.name=BomHelperApp
spring.servlet.multipart.max-file-size=10MB

# Activate the "dev" profile by default
spring.profiles.active=dev

# =========================================================
# GitLab connection settings (override per profile as needed)
# =========================================================
# Base URL of the company self-hosted GitLab. No trailing slash.
gitlab.base-url=https://gitlab.example.com
# HTTP timeouts (milliseconds)
gitlab.connect-timeout-ms=5000
gitlab.read-timeout-ms=10000
# Page size when syncing user's Groups / Projects (GitLab max = 100)
gitlab.page-size=100
# Trust self-signed certificates? Set true only for internal HTTPS with self-signed certs.
gitlab.trust-self-signed=false
